<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
</head>
<body>
    <section style="
        background-color: #f8f9fa;
        padding: 64px 24px;
        border-radius: 16px;
        width: 800px;
    ">
        <div style="
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        ">
            <h1 style="
                font-size: 48px;
                font-weight: 700;
                color: #1a202c;
                margin-bottom: 16px;
            ">
                Build Amazing Products
            </h1>
            
            <p style="
                font-size: 20px;
                color: #4a5568;
                line-height: 32px;
                margin-bottom: 32px;
            ">
                Convert your code to stunning Figma designs in seconds. 
                Save time and maintain consistency across your projects.
            </p>
            
            <div style="
                display: flex;
                gap: 16px;
                justify-content: center;
                flex-direction: row;
            ">
                <button style="
                    background-color: #667eea;
                    color: #ffffff;
                    padding: 16px 32px;
                    border-radius: 8px;
                    font-size: 16px;
                    font-weight: 600;
                    border: none;
                    cursor: pointer;
                ">
                    Get Started
                </button>
                
                <button style="
                    background-color: transparent;
                    color: #667eea;
                    padding: 16px 32px;
                    border-radius: 8px;
                    font-size: 16px;
                    font-weight: 600;
                    border: 2px solid #667eea;
                    cursor: pointer;
                ">
                    Learn More
                </button>
            </div>
        </div>
    </section>
</body>
</html>
