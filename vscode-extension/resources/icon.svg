<svg width="64" height="64" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="none" />

  <!-- Color palette -->
  <!-- Main pixel color: medium grey -->
  
  <!-- Left bracket "[" -->
  <rect x="2" y="3" width="1" height="10" fill="#888888" />
  <rect x="3" y="3" width="3" height="1" fill="#888888" />
  <rect x="3" y="12" width="3" height="1" fill="#888888" />

  <!-- Right bracket "]" -->
  <rect x="13" y="3" width="1" height="10" fill="#888888" />
  <rect x="10" y="3" width="3" height="1" fill="#888888" />
  <rect x="10" y="12" width="3" height="1" fill="#888888" />

  <!-- Slash "/" -->
  <!-- Diagonal from bottom-left inside to top-right inside -->
  <rect x="7" y="11" width="1" height="1" fill="#888888" />
  <rect x="8" y="10" width="1" height="1" fill="#888888" />
  <rect x="9" y="9" width="1" height="1" fill="#888888" />
  <rect x="10" y="8" width="1" height="1" fill="#888888" />
  <rect x="11" y="7" width="1" height="1" fill="#888888" />
</svg>
